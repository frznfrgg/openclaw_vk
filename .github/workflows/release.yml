name: Build and Release Custom OpenClaw

on:
  release:
    types: [published]

jobs:
  build-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build the project
        run: pnpm build

      - name: Delete node_modules to save space
        run: rm -rf node_modules

      - name: Zip the built code
        run: zip -r custom-openclaw-build.zip . -x "*.git*"

      - name: Attach Zip to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: custom-openclaw-build.zip
